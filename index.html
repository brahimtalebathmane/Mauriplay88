<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icon-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover, user-scalable=yes" />
    <meta name="theme-color" content="#000000" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#000000" />
    <meta name="color-scheme" content="dark" />
    <meta name="description" content="MauriPlay - High-End Digital Marketplace for Mauritanian Users" />

    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="msapplication-TileColor" content="#000000" />
    <meta name="msapplication-TileImage" content="/icon-144.png" />

    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="MauriPlay" />

    <title>MauriPlay - سوق الألعاب الرقمية</title>

    <!-- OneSignal Web SDK v16 -->
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>
      // Global OneSignal deferred queue used across the app (see OneSignalProvider).
      window.OneSignalDeferred = window.OneSignalDeferred || [];
      OneSignalDeferred.push(async function (OneSignal) {
        await OneSignal.init({
          appId: 'f5c09db0-25f6-4205-8c69-216e408d7370',
          safari_web_id: 'web.onesignal.auto.6187ce57-f346-4a86-93e4-7d70d494c000',
          notifyButton: { enable: true },
          // Allow localhost for PWA testing while keeping production secure
          allowLocalhostAsSecureOrigin: true,
        });

        // Best-effort: show a permission prompt for first-time visitors
        // Desktop & Android/iOS PWA (if supported). Run only when permission is "default".
        try {
          if (typeof Notification !== 'undefined' && Notification.permission === 'default') {
            // Prefer OneSignal's own slidedown prompt if available
            const anyOneSignal = OneSignal;
            if (anyOneSignal && anyOneSignal.Slidedown && typeof anyOneSignal.Slidedown.promptPush === 'function') {
              anyOneSignal.Slidedown.promptPush();
            } else if (typeof Notification.requestPermission === 'function') {
              // Fallback to native browser prompt
              Notification.requestPermission().catch(() => { });
            }
          }
        } catch (e) {
          console.warn('[OneSignal] Permission prompt failed', e);
        }
      });
    </script>

    <meta property="og:title" content="MauriPlay" />
    <meta property="og:description" content="High-End Digital Marketplace for Mauritanian Users" />
    <meta property="og:type" content="website" />

    <script>
      // Service Worker registration with update handling
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(registration => {
              console.log('[SW] Service worker registered');

              // Check for updates periodically
              setInterval(() => {
                registration.update();
              }, 60000); // Check every minute

              // Handle updates
              registration.addEventListener('updatefound', () => {
                const newWorker = registration.installing;
                if (newWorker) {
                  newWorker.addEventListener('statechange', () => {
                    if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                      console.log('[SW] New version available');
                      // Optionally notify user or auto-reload
                    }
                  });
                }
              });
            })
            .catch(err => {
              console.error('[SW] Registration failed:', err);
            });

          // Handle controller change (new SW activated)
          navigator.serviceWorker.addEventListener('controllerchange', () => {
            // Avoid reloading mid-interaction; the user can refresh after the current flow.
            console.log('[SW] New service worker activated');
          });
        });
      }

      // Prevent white screen by detecting stuck states
      window.addEventListener('load', () => {
        // If root element is empty after 5 seconds, something went wrong
        setTimeout(() => {
          const root = document.getElementById('root');
          if (root && (!root.hasChildNodes() || root.innerHTML.trim() === '')) {
            console.error('[App] Root element empty after load, reloading');
            window.location.reload();
          }
        }, 5000);
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
