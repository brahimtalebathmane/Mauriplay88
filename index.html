<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icon-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover, user-scalable=yes" />
    <meta name="theme-color" content="#000000" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#000000" />
    <meta name="color-scheme" content="dark" />
    <meta name="description" content="MauriPlay - High-End Digital Marketplace for Mauritanian Users" />

    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="msapplication-TileColor" content="#000000" />
    <meta name="msapplication-TileImage" content="/icon-144.png" />

    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="MauriPlay" />

    <title>MauriPlay - سوق الألعاب الرقمية</title>

    <!-- OneSignal Web SDK v16 - root worker, scope / for background push on Android & iOS PWA -->
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>
      window.OneSignalDeferred = window.OneSignalDeferred || [];
      // Fail-closed: only allow app code to call OneSignal APIs after init succeeds.
      window.__oneSignalInitOk = false;
      OneSignalDeferred.push(async function(OneSignal) {
        try {
          // OneSignal identity and subscription state rely on IndexedDB.
          // If IndexedDB is blocked (private mode / strict privacy), skip init to avoid SDK errors.
          if (!("indexedDB" in window)) throw new Error("IndexedDB unavailable");
          await new Promise((resolve, reject) => {
            try {
              const req = indexedDB.open("__mauriplay_onesignal_probe__", 1);
              req.onsuccess = () => {
                try { req.result.close(); } catch {}
                resolve(true);
              };
              req.onerror = () => reject(req.error || new Error("IndexedDB open failed"));
              req.onblocked = () => reject(new Error("IndexedDB blocked"));
            } catch (e) {
              reject(e);
            }
          });

          await OneSignal.init({
            appId: "f5c09db0-25f6-4205-8c69-216e408d7370",
            safari_web_id: "web.onesignal.auto.6187ce57-f346-4a86-93e4-7d70d494c000",
            notifyButton: { enable: true },
            allowLocalhostAsSecureOrigin: true,
            // Must be absolute paths so it works from any SPA route and on iOS PWA.
            serviceWorkerPath: "/OneSignalSDKWorker.js",
            serviceWorkerParam: { scope: "/" }
          });
          window.__oneSignalInitOk = true;
        } catch (e) {
          window.__oneSignalInitOk = false;
          console.warn("[OneSignal] init failed", e);
          return;
        }

        // Auto-show permission prompt for first-time visitors (Desktop, Android & iOS PWA)
        try {
          if (typeof Notification !== "undefined" && Notification.permission === "default") {
            if (OneSignal.Slidedown && typeof OneSignal.Slidedown.promptPush === "function") {
              OneSignal.Slidedown.promptPush();
            } else if (typeof Notification.requestPermission === "function") {
              Notification.requestPermission().catch(function() {});
            }
          }
        } catch (e) {
          console.warn("[OneSignal] Permission prompt failed", e);
        }
      });
    </script>

    <meta property="og:title" content="MauriPlay" />
    <meta property="og:description" content="High-End Digital Marketplace for Mauritanian Users" />
    <meta property="og:type" content="website" />

    <script>
      // Prevent white screen by detecting stuck states
      window.addEventListener('load', () => {
        // If root element is empty after 5 seconds, something went wrong
        setTimeout(() => {
          const root = document.getElementById('root');
          if (root && (!root.hasChildNodes() || root.innerHTML.trim() === '')) {
            console.error('[App] Root element empty after load, reloading');
            window.location.reload();
          }
        }, 5000);
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
