<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Generate MauriPlay Icons</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .icon-container {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .icon-box {
            text-align: center;
        }
        canvas {
            border: 1px solid #ccc;
            background: white;
        }
        button {
            padding: 10px 20px;
            background: #000;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover {
            background: #333;
        }
    </style>
</head>
<body>
    <h1>MauriPlay Icon Generator</h1>
    <p>Click the buttons below each icon to download it.</p>

    <div class="icon-container">
        <div class="icon-box">
            <h3>64x64</h3>
            <canvas id="canvas64" width="64" height="64"></canvas>
            <br>
            <button onclick="downloadIcon('canvas64', 'icon-64.png')">Download</button>
        </div>
        <div class="icon-box">
            <h3>192x192</h3>
            <canvas id="canvas192" width="192" height="192"></canvas>
            <br>
            <button onclick="downloadIcon('canvas192', 'icon-192.png')">Download</button>
        </div>
        <div class="icon-box">
            <h3>512x512</h3>
            <canvas id="canvas512" width="512" height="512"></canvas>
            <br>
            <button onclick="downloadIcon('canvas512', 'icon-512.png')">Download</button>
        </div>
        <div class="icon-box">
            <h3>512x512 Maskable</h3>
            <canvas id="canvas512m" width="512" height="512"></canvas>
            <br>
            <button onclick="downloadIcon('canvas512m', 'icon-512-maskable.png')">Download</button>
        </div>
    </div>

    <script>
        function drawIcon(canvas, maskable = false) {
            const ctx = canvas.getContext('2d');
            const size = canvas.width;

            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, size, size);

            const padding = maskable ? size * 0.2 : size * 0.1;
            const centerX = size / 2;
            const centerY = size / 2;

            ctx.fillStyle = '#FFFFFF';
            ctx.font = `bold ${size * 0.6}px Arial, sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('M', centerX, centerY);
        }

        function downloadIcon(canvasId, filename) {
            const canvas = document.getElementById(canvasId);
            const link = document.createElement('a');
            link.download = filename;
            link.href = canvas.toDataURL('image/png');
            link.click();
        }

        drawIcon(document.getElementById('canvas64'));
        drawIcon(document.getElementById('canvas192'));
        drawIcon(document.getElementById('canvas512'));
        drawIcon(document.getElementById('canvas512m'), true);
    </script>
</body>
</html>
