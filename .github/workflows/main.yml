name: AI Project Automation

on:
  push:
    branches:
      - main  # كل Push على main سيشغل Workflow تلقائيًا

jobs:
  ai_update:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ جلب المستودع
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ إعداد Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      # 3️⃣ تثبيت openai الإصدار القديم
      - name: Install OpenAI 0.28
        run: |
          pip install --upgrade pip
          pip install openai==0.28

      # 4️⃣ تشغيل سكريبت AI لتحليل المشروع وإنتاج التعديلات
      - name: Run OpenAI AI to update project
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python <<EOF
          import openai, pathlib, os

          openai.api_key = os.environ["OPENAI_API_KEY"]

          # جمع جميع ملفات المشروع
          files = [str(p) for p in pathlib.Path(".").rglob("*") if p.is_file()]

          prompt = f"""
          You are an AI developer. Review the following Vue 3 project files: {files}.
          1. Generate missing source files (components, pages, hooks, utils, types)
          2. Configure Supabase client
          3. Implement vue-router with auth and route guards
          4. Setup Pinia store and auth
          5. Fix TypeScript strict mode issues
          6. Add error handling
          7. Setup PWA manifest and icons
          8. Optimize build configuration
          9. Suggest fixes for any errors you find
          Output the changes ready to commit directly.
          """

          # إرسال الطلب إلى OpenAI باستخدام الإصدار القديم
          response = openai.ChatCompletion.create(
              model="gpt-4",
              messages=[{"role": "user", "content": prompt}],
              temperature=0
          )

          # حفظ التعديلات في ملف مؤقت
          with open("ai_suggestions.txt", "w") as f:
              f.write(response.choices[0].message["content"])
          EOF

      # 5️⃣ Commit التعديلات تلقائيًا
      - name: Commit changes
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "AI updates from OpenAI"
          git push
